<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <body class="page">

        <div th:fragment="layout(title, content)" class="page-wrapper">

            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">

                <link rel="stylesheet" th:href="@{/css/style.css}">

                <title th:replace="${title} ?: 'Terapia y Salud Mental'"></title>
            </head>

            <header class="main-header">
                <nav>
                    <a th:href="@{/}" class="nav-link">Inicio</a>
                    <a th:href="@{/psicologos}" class="nav-link">Buscar Terapeutas</a>
                    <a th:href="@{/blog}" class="nav-link">Blog (Recursos)</a>

                    <a sec:authorize="isAuthenticated()"
                       th:href="@{/dashboard}"
                       class="nav-link">Dashboard</a>

                    <a sec:authorize="hasRole('ADMINISTRADOR')"
                       th:href="@{/admin/nuevosusuarios}"
                       class="nav-link">Usuarios</a>

                    <div sec:authorize="isAuthenticated()" class="nav-right">
                        <form th:action="@{/logout}" method="post" style="display: contents;">
                            <button type="submit" class="nav-link btn-logout">Cerrar Sesión</button>
                        </form>
                    </div>

                    <div sec:authorize="!isAuthenticated()" class="nav-right" style="display: flex; gap: 10px;">
                        <a th:href="@{/login}" class="nav-link">Iniciar Sesión</a>
                        <a th:href="@{/registro}" class="nav-link">Registro</a>
                    </div>
                </nav>
            </header>

            <!-- CLAVE: el main con flex:1 empuja el footer hacia abajo -->
            <main class="page-content">
                <div id="content" th:replace="${content}">
                    <h1>Contenido por defecto</h1>
                </div>
            </main>

            <footer class="main-footer">
                <div class="footer-inner">
                    <div class="footer-left">
                        <h4>Terapia y Salud Mental</h4>
                        <p class="footer-text">
                            Acompañándote en tu bienestar emocional, con apoyo profesional y humano.
                        </p>
                    </div>

                    <div class="footer-right">
                        <p class="footer-links">
                            <a th:href="@{/psicologos}">Buscar terapeuta</a>
                            <span>·</span>
                            <a th:href="@{/blog}">Blog</a>
                            <span>·</span>
                            <a th:href="@{/foro}">Foro</a>
                        </p>
                        <p class="footer-copy">
                            &copy; 2025 Terapia y Salud Mental. Universidad Fidélitas.
                        </p>
                    </div>
                </div>
            </footer>

            <!-- Botón flotante de chat (solo usuarios autenticados) -->
            <div sec:authorize="isAuthenticated()" class="chat-float-container">
                <a th:href="@{/chat}" class="chat-float-button">
                    💬
                </a>
            </div>

        </div>

    </body>
</html>
